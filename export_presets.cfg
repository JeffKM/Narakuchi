; 나라쿠치 Web(HTML5) export 프리셋 — T04
; PWA(manifest/서비스워커) + 세로 고정. 빌드: godot --headless --export-release "Web" export/index.html
; 도트 규격은 docs/adr/0001-dot-art-spec.md 참조.

[preset.0]

name="Web"
platform="Web"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="mcp-shrimp-task-manager/*"
export_path="export/index.html"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
variant/thread_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include="<script>(function(){var O=window.AudioContext||window.webkitAudioContext;if(!O)return;var L=[];function P(o){var c=new O(o);L.push(c);return c;}P.prototype=O.prototype;window.AudioContext=P;if(window.webkitAudioContext){window.webkitAudioContext=P;}function u(){for(var i=0;i<L.length;i++){var c=L[i];if(c.state!=='running'){c.resume();}try{var b=c.createBuffer(1,1,22050);var s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start(0);}catch(e){}}}var ev=['touchend','touchstart','pointerup','mousedown','keydown','click'];for(var j=0;j<ev.length;j++){window.addEventListener(ev[j],u,{capture:true,passive:true});}})();</script><link rel=\"apple-touch-icon\" href=\"index.180x180.png\"><link rel=\"apple-touch-startup-image\" media=\"(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)\" href=\"splash_1170x2532.png\"><link rel=\"apple-touch-startup-image\" media=\"(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)\" href=\"splash_1290x2796.png\"><link rel=\"apple-touch-startup-image\" media=\"(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)\" href=\"splash_1179x2556.png\">"
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
html/godot_pool_size_hint=-1
html/godot_pool_size_min=4
progressive_web_app/enabled=true
; 단일 스레드(thread_support=false) → SharedArrayBuffer 불필요 → COOP/COEP 강제 끔. (→ ROADMAP T24 / 메모리 phase5-decisions)
progressive_web_app/ensure_cross_origin_isolation_headers=false
progressive_web_app/offline_page=""
progressive_web_app/display=1
progressive_web_app/orientation=2
; PWA 아이콘 = 옥자 얼굴 재활용 합성(tools/make_pwa_icons.py). 신규 AI 0.
progressive_web_app/icon_144x144="res://assets/sprites/pwa_icon_144.png"
progressive_web_app/icon_180x180="res://assets/sprites/pwa_icon_180.png"
progressive_web_app/icon_512x512="res://assets/sprites/pwa_icon_512.png"
progressive_web_app/background_color=Color(0.05, 0.043, 0.07, 1)
